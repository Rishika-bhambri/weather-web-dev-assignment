<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Weather App - Assignment 2</title>
    <style>
        /* Simple and clean styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: #fff;
            padding: 40px;
        }

        .main-container {
            max-width: 850px;
            margin: auto;
            background: #34495e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h2 { text-align: center; margin-bottom: 25px; color: #ecf0f1; }

        .search-area {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        #cityInput {
            flex: 2;
            padding: 12px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }

        #searchBtn {
            flex: 1;
            padding: 12px;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #searchBtn:hover { background-color: #d35400; }

        .result-flex {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
        }

        .history-box, .info-box {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 8px;
            min-height: 200px;
        }

        .history-box button {
            display: inline-block;
            margin: 5px;
            padding: 8px 12px;
            background: #95a5a6;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #2c3e50;
        }

        .weather-detail {
            border-bottom: 1px solid #5d6d7e;
            padding: 10px 0;
            display: flex;
            justify-content: space-between;
        }

        .error { color: #ff7675; font-weight: bold; }
        
        .clear-link {
            display: block;
            margin-top: 15px;
            font-size: 12px;
            color: #bdc3c7;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="main-container">
    <h2>Weather Finder</h2>

    <div class="search-area">
        <input type="text" id="cityInput" placeholder="Enter city (e.g. Noida, Paris)">
        <button id="searchBtn">Get Weather</button>
    </div>

    <div class="result-flex">
        <div class="history-box">
            <h4>Recent Searches</h4>
            <div id="historyList"></div>
            <span class="clear-link" onclick="deleteHistory()">Clear History</span>
        </div>

        <div class="info-box" id="weatherDisplay">
            <p>Results will appear here...</p>
        </div>
    </div>
</div>

<script>
    const MY_KEY = "af7b1d30628f9bdb578d63367fc7a97d";
    const display = document.getElementById("weatherDisplay");
    const historyDiv = document.getElementById("historyList");

    // Fetching data from API
    async function fetchWeather(city) {
        try {
            const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${MY_KEY}&units=metric`);
            
            if (!response.ok) {
                display.innerHTML = "<p class='error'>City not found. Try again!</p>";
                return;
            }

            const data = await response.json();
            showData(data);
            updateHistory(data.name);

        } catch (err) {
            console.log("Error fetching data:", err);
        }
    }

    function showData(obj) {
        display.innerHTML = `
            <h3>${obj.name}, ${obj.sys.country}</h3>
            <div class="weather-detail"><b>Temp:</b> <span>${obj.main.temp}°C</span></div>
            <div class="weather-detail"><b>Condition:</b> <span>${obj.weather[0].description}</span></div>
            <div class="weather-detail"><b>Humidity:</b> <span>${obj.main.humidity}%</span></div>
            <div class="weather-detail"><b>Wind:</b> <span>${obj.wind.speed} m/s</span></div>
        `;
    }

    function updateHistory(name) {
        let cityList = JSON.parse(localStorage.getItem("myCities")) || [];
        
        // Don't add if already exists
        if (!cityList.includes(name)) {
            cityList.push(name);
            if (cityList.length > 6) cityList.shift(); // Keep only last 6
            localStorage.setItem("myCities", JSON.stringify(cityList));
            renderHistory();
        }
    }

    function renderHistory() {
        let cityList = JSON.parse(localStorage.getItem("myCities")) || [];
        historyDiv.innerHTML = "";
        
        cityList.forEach(item => {
            let btn = document.createElement("button");
            btn.textContent = item;
            btn.onclick = () => fetchWeather(item);
            historyDiv.appendChild(btn);
        });
    }

    function deleteHistory() {
        localStorage.removeItem("myCities");
        renderHistory();
    }

    // Event Listeners
    document.getElementById("searchBtn").onclick = () => {
        let val = document.getElementById("cityInput").value;
        if(val) fetchWeather(val);
    };

    document.getElementById("cityInput").addEventListener("keypress", (e) => {
        if(e.key === "Enter") {
            fetchWeather(e.target.value);
        }
    });

    // Run on start
    renderHistory();

</script>

</body>
</html>
